name: Documentation issue
description: Report missing, outdated, confusing, or incorrect product documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form for docs problems in the product repo, Mesher runbook, landing docs, or product maintainer instructions.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I checked the related docs page and searched existing documentation issues.
          required: true
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Affected page or file
      placeholder: README.md / mesher/README.md / mesher/client/README.md
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What kind of docs issue is this?
      options:
        - incorrect information
        - outdated information
        - missing explanation
        - unclear instructions
        - typo / wording / formatting
        - broken link
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong today?
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested fix
  - type: textarea
    id: context
    attributes:
      label: Additional context
