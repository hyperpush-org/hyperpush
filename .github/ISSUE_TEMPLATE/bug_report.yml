name: Bug report
description: Report a reproducible defect in Mesher, landing, frontend-exp, or product repo CI/docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Please use this form for reproducible defects in the product-owned Hyperpush surfaces.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and checked the nearest maintainer docs first.
          required: true
        - label: I can reproduce this with the current main branch or a specific commit I list below.
          required: true
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Mesher runtime / API
        - Mesher maintainer scripts
        - landing app
        - frontend-exp
        - product CI / deploy
        - product docs / runbooks
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit / version tested
      placeholder: a9ad114 / local branch / release tag
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: path
    attributes:
      label: Product path
      description: Tell us what you were running.
      placeholder: mesher/, mesher/landing/, mesher/frontend-exp/
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, errors, or screenshots
      render: shell
