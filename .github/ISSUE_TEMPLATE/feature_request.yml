name: Feature request
description: Propose a product improvement for Mesher, mesher/client, landing, or product operations.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the product workflow or user problem you want to improve.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and the maintainer docs first.
          required: true
        - label: I explained the user problem or workflow gap, not only the solution shape.
          required: true
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Mesher runtime / API
        - Mesher maintainer workflow
        - dashboard client (`mesher/client`)
        - landing app
        - product CI / deploy
        - product docs / runbooks
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
  - type: textarea
    id: context
    attributes:
      label: Additional context
